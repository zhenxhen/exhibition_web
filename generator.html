<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterPlay | Pixel Transformation</title>
    <link rel="stylesheet" href="https://use.typekit.net/ulp5qtm.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="workspace-container">
        <header class="header">
            <h1 class="logo-text">InterPlay Logo Generator</h1>
            <p class="subtitle">For Exhibition Committee</p>
        </header>

        <main class="main-content">
            <!-- 단일 캔버스 영역 (원본 배경과 픽셀 패치들이 하나로 합쳐져 그려지는 도화지) -->
            <div class="comparison-slider" id="comparison-slider">
                <canvas class="canvas-pixelated" id="canvas-pixelated"></canvas>
            </div>

            <!-- D-Day 카운트다운 타이머 -->
            <div class="countdown" id="countdown-timer">00:00:00</div>

            <!-- 동그라미 액션 버튼 및 시드 입력영역 -->
            <div class="actions-panel">
                <div class="button-group">
                    <!-- Randomizing Button (Dice icon) -->
                    <button class="action-btn" id="btn-random" title="Randomize Box Layout">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <circle cx="15.5" cy="8.5" r="1.5"></circle>
                            <circle cx="15.5" cy="15.5" r="1.5"></circle>
                            <circle cx="8.5" cy="15.5" r="1.5"></circle>
                        </svg>
                    </button>
                    <!-- Download Save Button (Save icon) -->
                    <button class="action-btn" id="btn-save" title="Save as PNG">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                    </button>
                </div>

                <div class="seed-input-wrapper">
                    <label for="seed-input">Seed:</label>
                    <input type="number" id="seed-input" value="123456" min="1" max="999999999">
                </div>
            </div>
        </main>

        <!-- 숨겨진 소스 원본 이미지 -->
        <img src="Logo/InterPlay.png" id="image-original" alt="Original Logo" style="display: none;">
    </div>

    <script src="script.js"></script>
</body>

</html>
