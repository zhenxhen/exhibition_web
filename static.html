<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#2 — Static</title>
    <link rel="stylesheet" href="static.css">
    <!-- Import Three.js as an ES module via import map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="canvas-container"></div>

    <!-- UI Panel -->
    <div id="ui-panel">
        <div class="control-row" id="controls-2d"
            style="display: none; justify-content: space-between; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 5px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div id="color-picker-container" style="display: flex; gap: 8px;"></div>
                <button class="icon-btn" id="invert-btn" title="Invert Colors"
                    style="width: auto; height: 32px; padding: 0 10px; font-size: 11px; font-weight: 700; border-radius: 8px;">INV</button>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 600;">SIZE</span>
                <input type="range" id="scale-slider" min="0.5" max="3.0" step="0.1" value="1.0" style="width: 60px;">
            </div>
        </div>
        <div class="control-row">
            <input type="text" id="seed-input" placeholder="Seed" readonly style="flex: 1; min-width: 0;">
            <button class="icon-btn" id="randomize-btn" title="Randomize">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <polyline points="23 20 23 14 17 14"></polyline>
                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                </svg>
            </button>
            <button class="icon-btn" id="toggle-2d-btn" title="Toggle 2D Component View"
                style="font-size: 11.5px; font-weight: 700; min-width: 40px;">2D</button>
        </div>
        <div class="control-row">
            <div class="save-group">
                <select id="save-size">
                    <option value="1">x1</option>
                    <option value="2" selected>x2</option>
                    <option value="4">x4</option>
                    <option value="8">x8</option>
                </select>
                <button class="icon-btn" id="save-btn" title="Download PNG">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
                <button class="icon-btn" id="toggle-guide-btn" title="Toggle Guides">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="static.js"></script>
</body>

</html>
