<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InterPlay</title>
    <meta name="title" content="InterPlay">
    <meta name="description" content="Creative Computing Exhibition">
    <meta name="keywords" content="Exhibition, Media, Art, UAL, CCI, InterPlay">
    <meta name="author" content="UAL, CCI, eeezeen">

    <link rel="icon" href="public/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="public/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32x32.png">
    <link rel="apple-touch-icon" href="public/apple-touch-icon.png">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://interplay-cci.co.uk/">
    <meta property="og:title" content="InterPlay">
    <meta property="og:description" content="Creative Computing Exhibition">
    <meta property="og:image" content="public/og-image.jpg">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <link rel="stylesheet" href="https://use.typekit.net/ulp5qtm.css">
    <link rel="stylesheet" href="https://use.typekit.net/hph2cdy.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="launch.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="22e52cdf-48d7-41e9-b8b5-087b38bbcd3f"></script>
</head>

<body>

    <div id="canvas-container"></div>

    <div class="launch-layout">

        <!-- Left: Logo -->
        <div class="launch-left">
            <div class="launch-left-inner">
                <a href="about.html" style="display:contents;">
                    <div class="comparison-slider" id="comparison-slider">
                        <canvas class="canvas-pixelated" id="canvas-pixelated"></canvas>
                    </div>
                </a>
                <div class="launch-left-text">Creative Computing Exhibition</div>
                <div class="launch-left-links">
                    <a href="https://www.instagram.com/interplay_cci/" target="_blank">Instagram</a>
                    <a href="https://www.eventbrite.co.uk/e/interplay-ual-creative-computing-exhibition-tickets-1988400645858?aff=oddtdtcreator"
                        target="_blank">Eventbrite</a>
                    <a href="https://uk.linkedin.com/in/interplay-cci-a853a1405" target="_blank">LinkedIn</a>
                </div>
            </div>
            <div class="launch-left-credits">
                <div class="launch-credit">
                    <span class="launch-credit-label">Organized by</span>
                    <img src="Logo/UAL.CCI.black_crop.png" alt="UAL CCI">
                </div>
                <div class="launch-credit">
                    <span class="launch-credit-label">Software Sponsored by</span>
                    <img src="Logo/TouchDesigner_Derivative_logo_black.png" alt="TouchDesigner">
                </div>
            </div>
        </div>

        <!-- Right: Project List -->
        <div class="launch-right">
            <div class="project-list" id="project-list">
                <!-- populated by JS -->
            </div>
        </div>

    </div>

    <img src="Logo/InterPlay.png" id="image-original" style="display:none;" alt="">

    <script src="script.js"></script>
    <script type="module" src="visual.js"></script>

    <script>
        const palette = ['#0088cc', '#e63946', '#d48a00', '#2a9d8f', '#c85a17'];

        fetch('List/interplay_projects.json')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('project-list');
                const projects = data.projects;
                const start = Math.floor(Math.random() * projects.length);
                const ordered = [...projects.slice(start), ...projects.slice(0, start)];
                ordered.forEach((p, i) => {
                    const a = document.createElement('a');
                    a.href = `project.html?id=${p.submission_id}`;
                    a.className = 'project-item';
                    a.innerHTML = `<span class="project-name">${p.project_name}</span>`;
                    a.style.setProperty('--hover-color', palette[i % palette.length]);
                    list.appendChild(a);
                });
            });
    </script>

</body>

</html>
