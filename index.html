<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta Tags -->
    <title>InterPlay</title>
    <meta name="title" content="InterPlay">
    <meta name="description" content="[Creative Computing Exhibition]">
    <meta name="keywords" content="[Exhibition, Media, Art, UAL, CCI, InterPlay]">
    <meta name="author" content="[UAL, CCI, eeezeen]">

    <!-- Favicons -->
    <link rel="icon" href="public/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="public/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32x32.png">
    <link rel="apple-touch-icon" href="public/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="public/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="public/android-chrome-512x512.png">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="[https://interplay-cci.co.uk/]">
    <meta property="og:title" content="InterPlay">
    <meta property="og:description" content="[Creative Computing Exhibition]">
    <meta property="og:image" content="public/og-image.jpg">
    <!-- 배포 시에는 'https://주소/public/og-image.jpg' 로 적는 것이 가장 안전합니다. -->

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="[https://interplay-cci.co.uk/]">
    <meta property="twitter:title" content="InterPlay">
    <meta property="twitter:description" content="[Creative Computing Exhibition]">
    <meta property="twitter:image" content="public/og-image.jpg">

    <!-- Import map for Three.js so visual.js ES module imports work in browser without bundler -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <link rel="stylesheet" href="https://use.typekit.net/ulp5qtm.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body,
        .workspace-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        @media (max-width: 768px) {

            body,
            .workspace-container {
                min-height: 100svh;
            }
        }

        .comparison-slider {
            margin: auto;
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>
    <div class="workspace-container">

        <div class="main-display">
            <div class="comparison-slider" id="comparison-slider">
                <canvas class="canvas-pixelated" id="canvas-pixelated"></canvas>
            </div>

        </div>

        <div class="countdown-group">
            <div class="countdown" id="countdown-timer">00:00:00</div>
            <div class="exhibition-schedule">
                21 May 17:00 - 21:00<br>
                22 May 14:00 - 22:00<br>
                23 May 11:00 - 20:00<br>
                24 May 11:00 - 16:00
            </div>
        </div>
    </div>

    <img src="Logo/InterPlay.png" id="image-original" style="display: none;" alt="">


    <img src="Logo/UAL.CCI.black.png" class="footer-logo" alt="UAL CCI">

    <script src="script.js"></script>
    <script type="module" src="visual.js"></script>
</body>

</html>
