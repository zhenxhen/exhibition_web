<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterPlay</title>
    <!-- Import map for Three.js so visual.js ES module imports work in browser without bundler -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <link rel="stylesheet" href="https://use.typekit.net/ulp5qtm.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 깔끔하게 정중앙에 위치하도록 로컬 화면 오버레이드 */
        body,
        .workspace-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        @media (max-width: 768px) {

            body,
            .workspace-container {
                min-height: 100svh;
            }
        }

        .comparison-slider {
            margin: auto;
        }
    </style>
</head>

<body>
    <!-- 3D 캔버스 배경 (전체 화면) -->
    <div id="canvas-container"></div>
    <div class="workspace-container">
        <!-- 중앙 정렬을 위한 래퍼 계층 -->
        <div class="main-display">
            <!-- 캔버스 (가운데 컨테이너 영역만 고립) -->
            <div class="comparison-slider" id="comparison-slider">
                <canvas class="canvas-pixelated" id="canvas-pixelated"></canvas>
            </div>

        </div>

        <!-- D-Day 카운트다운 타이머 및 전시 일정 (main-display 분리하여 스태킹 이슈 해결) -->
        <div class="countdown-group">
            <div class="countdown" id="countdown-timer">00:00:00</div>
            <div class="exhibition-schedule">
                21 May 17:00 - 21:00<br>
                22 May 14:00 - 22:00<br>
                23 May 11:00 - 20:00<br>
                24 May 11:00 - 16:00
            </div>
        </div>
    </div>

    <!-- 숨겨진 원본 로고 데이터 -->
    <img src="Logo/InterPlay.png" id="image-original" style="display: none;" alt="">


    <img src="Logo/UAL.CCI.black.png" class="footer-logo" alt="UAL CCI">

    <script src="script.js"></script>
    <script type="module" src="visual.js"></script>
</body>

</html>
